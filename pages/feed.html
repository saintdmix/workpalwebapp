<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>WorkPal - Artisan Hub</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "inverse-on-surface": "#191022",
                        "on-surface-variant": "#cec2d8",
                        "on-primary-fixed": "#290055",
                        "surface-container-low": "#1c1426",
                        "outline-variant": "#4c4355",
                        "secondary-fixed-dim": "#d8b9ff",
                        "primary": "#7f13ec",
                        "error": "#ffb4ab",
                        "tertiary-container": "#984600",
                        "primary-container": "#2d1b4d",
                        "on-secondary-fixed": "#290055",
                        "secondary": "#2d1b4d",
                        "surface": "#191022",
                        "on-error": "#690005",
                        "primary-fixed-dim": "#d8b9ff",
                        "on-surface": "#f7f6f8",
                        "inverse-primary": "#d8b9ff",
                        "surface-variant": "#2d1b4d",
                        "surface-container-lowest": "#0d0814",
                        "on-background": "#f7f6f8",
                        "background": "#191022",
                        "surface-container-highest": "#382f44",
                        "on-tertiary-fixed-variant": "#753400",
                        "on-secondary-fixed-variant": "#59308f",
                        "tertiary-fixed-dim": "#ffb68b",
                        "on-primary": "#ffffff",
                        "surface-container-high": "#2d2438",
                        "on-primary-container": "#e5ceff",
                        "on-secondary-container": "#eddcff",
                        "on-secondary": "#ffffff",
                        "surface-bright": "#2d1b4d",
                        "inverse-surface": "#f7f6f8",
                        "on-tertiary-fixed": "#321200",
                        "surface-tint": "#7f13ec",
                        "surface-container": "#231b2e",
                        "secondary-fixed": "#eddcff",
                        "on-tertiary": "#522300",
                        "on-primary-fixed-variant": "#6200bc",
                        "tertiary": "#ffb68b",
                        "on-error-container": "#ffdad6",
                        "secondary-container": "#3d2a5e",
                        "outline": "#7f13ec",
                        "surface-dim": "#150e1c",
                        "on-tertiary-container": "#ffcdb1",
                        "tertiary-fixed": "#ffdbc8",
                        "primary-fixed": "#eddcff",
                        "error-container": "#93000a"
                    },
                    fontFamily: {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        body {
            background-color: #191022;
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="text-on-surface">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#191022]/95 backdrop-blur-md border-b border-[#7f13ec]/10 shadow-sm" id="feedHeader">
<div class="flex justify-between items-center px-4 md:px-6 max-w-[1920px] mx-auto h-16">
<div class="flex items-center gap-3">
<span class="text-xl font-bold tracking-tighter text-white">WorkPal</span>
</div>
<div class="flex items-center gap-3">
<div class="relative hidden lg:block">
<input class="bg-surface-container-high border-none rounded-full py-1.5 pl-10 pr-4 text-sm focus:ring-1 focus:ring-primary w-56" id="feedSearchInput" placeholder="Search artisans..." type="text"/>
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">search</span>
</div>
<!-- Mobile search toggle -->
<button class="lg:hidden p-2 text-slate-400 hover:text-white transition-colors" id="feedSearchToggle" type="button">
<span class="material-symbols-outlined">search</span>
</button>
<a class="relative text-slate-400 hover:text-white transition-colors active:scale-95" href="../pages/notifications.html" id="feedNotifBtn">
<span class="material-symbols-outlined">notifications</span>
<span class="absolute -top-1 -right-1 hidden min-w-[18px] h-[18px] bg-red-500 text-white text-[10px] font-black rounded-full flex items-center justify-center px-1" id="feedNotifBadge" data-shell-notification-badge></span>
</a>
<a href="../pages/profiles.html" id="feedAvatarLink">
<div class="w-8 h-8 rounded-full overflow-hidden border border-primary/30 bg-secondary" id="feedAvatarWrap">
<img alt="Profile" class="w-full h-full object-cover" id="feedAvatarImg" src=""/>
</div>
</a>
</div>
</div>
<!-- Mobile search bar (expandable) -->
<div class="hidden lg:hidden px-4 pb-2 bg-[#191022]/95" id="feedSearchMobile">
<div class="relative">
<input class="w-full bg-surface-container-high border-none rounded-full py-2 pl-10 pr-4 text-sm focus:ring-1 focus:ring-primary" id="feedSearchInputMobile" placeholder="Search artisans..." type="text"/>
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">search</span>
</div>
</div>
</header>
<div class="flex pt-16 max-w-[1920px] mx-auto min-h-screen" id="feedLayout">
<!-- SideNavBar (Left) -->
<aside class="fixed left-0 top-16 h-[calc(100vh-64px)] hidden md:flex" data-app-sidebar></aside>
<!-- Main Content (Central Feed) -->
<main class="flex-1 p-4 md:p-6 min-w-0" data-app-shell-shift>
<!-- Feed Content -->
<div class="hidden mb-4 rounded-xl border border-red-500/40 bg-red-500/10 text-red-200 px-4 py-3 text-sm" id="workfeedsError"></div>
<div class="space-y-6" id="workfeedsList"></div>
</main>
</div>
<!-- Comment Thread Modal -->
<div class="fixed inset-0 z-[75] hidden bg-black/80 backdrop-blur-sm" id="commentModal">
  <div class="mx-auto flex h-full w-full max-w-3xl flex-col bg-[#0d0814] text-white">
    <div class="flex items-center gap-3 border-b border-white/10 px-4 py-3">
      <button class="flex h-10 w-10 items-center justify-center rounded-full bg-white/5 text-white transition-all hover:bg-white/10" id="commentModalClose" type="button">
        <span class="material-symbols-outlined">arrow_back</span>
      </button>
      <div class="min-w-0">
        <p class="text-2xl font-black tracking-tight">Post</p>
        <p class="text-xs uppercase tracking-[0.3em] text-slate-500">Comments</p>
      </div>
    </div>
    <div class="hidden border-b border-red-500/30 bg-red-500/10 px-4 py-3 text-sm text-red-200" id="commentModalError"></div>
    <div class="min-h-0 flex-1 overflow-y-auto">
      <div class="border-b border-white/10 px-4 py-4" id="commentModalPost"></div>
      <div class="border-b border-white/10 px-4 py-4">
        <div class="hidden pb-3 text-sm text-primary" id="commentReplyMeta">
          <span id="commentReplyLabel"></span>
          <button class="ml-3 text-xs font-bold uppercase tracking-widest text-slate-400 transition-colors hover:text-white" id="commentReplyCancel" type="button">Cancel</button>
        </div>
        <form class="space-y-3" id="commentComposerForm">
          <label class="block">
            <span class="sr-only">Write a comment</span>
            <textarea class="min-h-[110px] w-full resize-none rounded-3xl border border-white/10 bg-transparent px-4 py-4 text-base text-white placeholder:text-slate-500 focus:border-primary focus:outline-none focus:ring-0" id="commentComposerInput" placeholder="Post your reply"></textarea>
          </label>
          <div class="flex items-center justify-end">
            <button class="rounded-full bg-white px-6 py-3 text-sm font-black text-[#191022] transition-all hover:opacity-90 disabled:cursor-not-allowed disabled:opacity-50" id="commentComposerSubmit" type="submit">Reply</button>
          </div>
        </form>
      </div>
      <div class="px-4 py-4">
        <div class="space-y-0" id="commentThreadList"></div>
      </div>
    </div>
  </div>
</div>
<!-- Media Viewer Modal -->
<div class="fixed inset-0 bg-black/90 backdrop-blur-sm z-[80] hidden items-center justify-center p-4" id="mediaViewerModal">
  <button class="absolute top-4 right-4 w-10 h-10 rounded-full bg-white/10 text-white hover:bg-white/20 transition-all flex items-center justify-center z-10" id="mediaViewerClose">
    <span class="material-symbols-outlined">close</span>
  </button>
  <button class="absolute left-4 top-1/2 -translate-y-1/2 w-10 h-10 rounded-full bg-white/10 text-white hover:bg-white/20 transition-all flex items-center justify-center" id="mediaViewerPrev">
    <span class="material-symbols-outlined">chevron_left</span>
  </button>
  <button class="absolute right-16 top-1/2 -translate-y-1/2 w-10 h-10 rounded-full bg-white/10 text-white hover:bg-white/20 transition-all flex items-center justify-center" id="mediaViewerNext">
    <span class="material-symbols-outlined">chevron_right</span>
  </button>
  <div class="max-w-4xl w-full flex flex-col items-center gap-4">
    <img class="max-h-[80vh] max-w-full rounded-xl object-contain" id="mediaViewerImg" src="" alt="Media"/>
    <div class="flex gap-2" id="mediaViewerDots"></div>
  </div>
</div>
<script type="module" src="../js/app-shell.js"></script>
<script type="module" src="../js/workfeeds-page.js?v=5"></script>
<script>
  // Mobile search toggle
  document.getElementById('feedSearchToggle')?.addEventListener('click', () => {
    const bar = document.getElementById('feedSearchMobile');
    const layout = document.getElementById('feedLayout');
    const isHidden = bar.classList.contains('hidden');
    bar.classList.toggle('hidden');
    if (layout) layout.style.paddingTop = isHidden ? '7rem' : '4rem';
    if (!bar.classList.contains('hidden')) document.getElementById('feedSearchInputMobile')?.focus();
  });
  // Sync mobile search input to the main feedSearchInput id expected by workfeeds-page.js
  document.getElementById('feedSearchInputMobile')?.addEventListener('input', (e) => {
    const main = document.getElementById('feedSearchInput');
    if (main) { main.value = e.target.value; main.dispatchEvent(new Event('input')); }
  });
</script>
</body></html>
